<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Habitline</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%2310b981'/%3E%3Cstop offset='1' stop-color='%232dd4bf'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='%230b0f14'/%3E%3Cpath d='M16 34l8 8 24-24' fill='none' stroke='url(%23g)' stroke-width='7' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<style>
  :root{
    --bg:#0b0f14;
    --surface:#151b23;
    --border:#232b36;
    --text:#e6edf3;
    --text-dim:#8b98a5;
    --text-dimmer:#5b6773;
    --accent-a:#10b981;
    --accent-b:#2dd4bf;
    --danger:#f87171;
    --radius:1rem;
    --radius-sm:0.6rem;
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif,"Apple Color Emoji","Segoe UI Emoji";
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:720px;margin:0 auto;padding:24px 16px 96px}
  button{font-family:inherit;cursor:pointer}
  input,select{font-family:inherit}
  a{color:inherit}
  ::selection{background:rgba(16,185,129,.35)}

  .accent-text{
    background:linear-gradient(135deg,var(--accent-a),var(--accent-b));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .btn{
    border:1px solid var(--border);background:var(--surface);color:var(--text);
    border-radius:var(--radius-sm);padding:10px 16px;font-size:14px;font-weight:600;
    transition:transform .15s ease,background .15s ease,border-color .15s ease;
  }
  .btn:hover{border-color:#33404e}
  .btn:active{transform:scale(.97)}
  .btn-primary{
    border:none;color:#04231a;
    background:linear-gradient(135deg,var(--accent-a),var(--accent-b));
    box-shadow:0 4px 20px -6px rgba(16,185,129,.5);
  }
  .btn-primary:hover{filter:brightness(1.06)}
  .btn-ghost{background:transparent;border-color:transparent;color:var(--text-dim)}
  .btn-ghost:hover{color:var(--text);background:rgba(255,255,255,.04)}
  .btn-danger{color:var(--danger);border-color:rgba(248,113,113,.3)}
  .btn-danger:hover{background:rgba(248,113,113,.08)}
  .btn-icon{padding:8px;border-radius:10px;line-height:0}
  .btn:disabled{opacity:.35;cursor:not-allowed;transform:none}

  header.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
  header.top h1{font-size:19px;margin:0;letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
  .navbtns{display:flex;gap:6px}
  .navbtns button.active{color:var(--text);background:rgba(255,255,255,.06);border-color:var(--border)}

  .hero{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:24px;margin-bottom:20px;display:flex;align-items:center;gap:20px;
    box-shadow:0 10px 30px -12px rgba(0,0,0,.5);
  }
  .hero .ring-wrap{position:relative;width:88px;height:88px;flex:none}
  .hero svg.ring{transform:rotate(-90deg)}
  .hero .ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px}
  .hero .info .date{color:var(--text-dim);font-size:13px;margin-bottom:4px}
  .hero .info .msg{font-size:16px;font-weight:600}

  .empty{
    text-align:center;padding:60px 20px;border:1px dashed var(--border);border-radius:var(--radius);
  }
  .empty svg{width:120px;height:120px;margin-bottom:12px;opacity:.85}
  .empty p{color:var(--text-dim);margin:0 0 18px;font-size:14px}

  .habit-list{display:flex;flex-direction:column;gap:12px}
  .habit-card{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:16px;transition:transform .15s ease,border-color .15s ease;
  }
  .habit-card.archived{opacity:.55}
  .habit-row{display:flex;align-items:center;gap:14px}
  .check-ring{
    position:relative;flex:none;width:52px;height:52px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    border:2px solid var(--border);transition:transform .15s ease,border-color .15s ease,background .15s ease;
    outline:none;
  }
  .check-ring:focus-visible{box-shadow:0 0 0 3px rgba(45,212,191,.45)}
  .check-ring .emoji{font-size:22px;transition:transform .15s ease}
  .check-ring.done{border-color:transparent;background:linear-gradient(135deg,var(--accent-a),var(--accent-b))}
  .check-ring.done.pop{animation:pop .28s ease}
  @keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.22)}100%{transform:scale(1)}}
  .habit-meta{flex:1;min-width:0}
  .habit-name{font-weight:600;font-size:15px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .habit-sub{color:var(--text-dim);font-size:12.5px;margin-top:2px;display:flex;gap:10px;flex-wrap:wrap}
  .flame{font-size:12px}
  .card-actions{display:flex;gap:2px;flex:none}

  .week-strip{display:flex;gap:6px;margin-top:12px}
  .week-cell{
    flex:1;aspect-ratio:1;border-radius:8px;border:1px solid var(--border);
    background:rgba(255,255,255,.02);position:relative;transition:transform .15s ease,background .15s ease;
    outline:none;min-width:0;
  }
  .week-cell:focus-visible{box-shadow:0 0 0 2px rgba(45,212,191,.5)}
  .week-cell.done{background:linear-gradient(135deg,var(--accent-a),var(--accent-b));border-color:transparent}
  .week-cell.unscheduled{background:transparent;border-style:dashed;opacity:.4}
  .week-cell.future{opacity:.25;cursor:not-allowed}
  .week-cell.today{border-color:var(--accent-b)}
  .week-cell:not(.future):not(.unscheduled):hover{transform:scale(1.08)}
  .week-labels{display:flex;gap:6px;margin-top:4px}
  .week-labels span{flex:1;text-align:center;font-size:9px;color:var(--text-dimmer);min-width:0}

  .fab-row{display:flex;justify-content:center;margin-top:20px}

  .modal-backdrop{
    position:fixed;inset:0;background:rgba(4,6,9,.6);backdrop-filter:blur(2px);
    display:flex;align-items:flex-end;justify-content:center;z-index:50;
    opacity:0;pointer-events:none;transition:opacity .15s ease;
  }
  .modal-backdrop.open{opacity:1;pointer-events:auto}
  @media (min-width:520px){.modal-backdrop{align-items:center}}
  .modal{
    background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;
    width:100%;max-width:480px;padding:22px;max-height:88vh;overflow-y:auto;
    transform:translateY(16px);transition:transform .15s ease;
  }
  @media (min-width:520px){.modal{border-radius:20px;transform:translateY(0) scale(.98)}}
  .modal-backdrop.open .modal{transform:translateY(0) scale(1)}
  .modal h2{margin:0 0 16px;font-size:18px}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:12.5px;color:var(--text-dim);margin-bottom:6px;font-weight:600}
  .field input[type=text]{
    width:100%;background:#0e141b;border:1px solid var(--border);border-radius:10px;
    padding:11px 12px;color:var(--text);font-size:14px;outline:none;transition:border-color .15s ease;
  }
  .field input[type=text]:focus{border-color:var(--accent-b)}
  .emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px}
  .emoji-opt{
    aspect-ratio:1;border-radius:10px;border:1px solid var(--border);background:#0e141b;
    display:flex;align-items:center;justify-content:center;font-size:18px;transition:transform .15s ease,border-color .15s ease;
  }
  .emoji-opt.sel{border-color:var(--accent-b);background:rgba(45,212,191,.12);transform:scale(1.05)}
  .color-row{display:flex;gap:8px;flex-wrap:wrap}
  .color-opt{width:30px;height:30px;border-radius:50%;border:2px solid transparent;transition:transform .15s ease,border-color .15s ease}
  .color-opt.sel{border-color:#fff;transform:scale(1.12)}
  .freq-row{display:flex;gap:8px;margin-bottom:10px}
  .freq-btn{flex:1;padding:8px 4px;border-radius:10px;border:1px solid var(--border);background:#0e141b;color:var(--text-dim);font-size:13px;font-weight:600;transition:.15s ease}
  .freq-btn.sel{color:#04231a;border-color:transparent;background:linear-gradient(135deg,var(--accent-a),var(--accent-b))}
  .day-row{display:flex;gap:6px}
  .day-btn{flex:1;padding:8px 0;border-radius:10px;border:1px solid var(--border);background:#0e141b;color:var(--text-dim);font-size:12px;font-weight:700;transition:.15s ease}
  .day-btn.sel{color:#04231a;border-color:transparent;background:linear-gradient(135deg,var(--accent-a),var(--accent-b))}
  .modal-actions{display:flex;gap:10px;margin-top:20px}
  .modal-actions .btn{flex:1}
  .hint{color:var(--text-dimmer);font-size:11.5px;margin-top:6px}

  .section-title{font-size:13px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;margin:28px 0 12px}
  .section-title:first-child{margin-top:0}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px}

  .heatmap-scroll{overflow-x:auto;padding-bottom:6px}
  .heatmap{display:grid;grid-auto-flow:column;grid-template-rows:repeat(7,1fr);gap:3px;width:max-content}
  .hcell{width:11px;height:11px;border-radius:3px;background:#161d26;border:1px solid rgba(255,255,255,.03)}
  .hcell[data-lvl="1"]{background:#0a3d2e}
  .hcell[data-lvl="2"]{background:#0f6b4d}
  .hcell[data-lvl="3"]{background:#10a06e}
  .hcell[data-lvl="4"]{background:linear-gradient(135deg,var(--accent-a),var(--accent-b))}
  .heatmap-legend{display:flex;align-items:center;gap:4px;margin-top:10px;font-size:11px;color:var(--text-dimmer)}
  .heatmap-legend .hcell{width:10px;height:10px}

  .tooltip{
    position:fixed;background:#1c242e;border:1px solid var(--border);border-radius:8px;
    padding:6px 10px;font-size:12px;pointer-events:none;z-index:80;box-shadow:0 6px 20px rgba(0,0,0,.4);
    transform:translate(-50%,-115%);white-space:nowrap;
  }

  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .bar-row:last-child{margin-bottom:0}
  .bar-label{width:120px;flex:none;font-size:13px;display:flex;align-items:center;gap:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bar-track{flex:1;height:10px;background:#0e141b;border-radius:6px;overflow:hidden;border:1px solid var(--border)}
  .bar-fill{height:100%;background:linear-gradient(90deg,var(--accent-a),var(--accent-b));border-radius:6px;transition:width .3s ease}
  .bar-pct{width:38px;text-align:right;font-size:12px;color:var(--text-dim);flex:none}

  .totals-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
  .total-box{background:#0e141b;border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
  .total-box .num{font-size:22px;font-weight:700}
  .total-box .lbl{font-size:11px;color:var(--text-dim);margin-top:2px}

  .settings-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .settings-row .btn{flex:1;min-width:130px}

  canvas#confetti{position:fixed;inset:0;pointer-events:none;z-index:100}

  @media (max-width:400px){
    .hero{padding:18px;gap:14px}
    .hero .ring-wrap{width:72px;height:72px}
    .emoji-grid{grid-template-columns:repeat(6,1fr)}
    .bar-label{width:90px}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition-duration:.001s !important;animation-duration:.001s !important}
  }
  .visually-hidden{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<canvas id="confetti" aria-hidden="true"></canvas>

<script>
(function(){
"use strict";

/* =========================================================
   STATE
   ========================================================= */
const STORAGE_KEY = "habitline.state.v1";
const VERSION = 1;

const EMOJI_CHOICES = ["💧","🏃","📚","🧘","🥗","💤","🚭","💊","✍️","🎯","🧹","🎸","☀️","🦷","🚴","🙏"];
const COLOR_CHOICES = ["#10b981","#2dd4bf","#60a5fa","#a78bfa","#f472b6","#fb923c","#facc15","#f87171"];
const DAY_LABELS = ["S","M","T","W","T","F","S"];
const DAY_LABELS_FULL = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function defaultState(){
  return { habits: [], version: VERSION, confettiShownDate: null };
}

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState();
    const parsed = JSON.parse(raw);
    return migrate(parsed);
  }catch(e){
    console.error("Failed to load state", e);
    return defaultState();
  }
}

function migrate(s){
  if(!s || typeof s !== "object") return defaultState();
  if(!Array.isArray(s.habits)) s.habits = [];
  if(s.version == null) s.version = VERSION;
  if(s.confettiShownDate === undefined) s.confettiShownDate = null;
  // future migrations keyed on s.version go here
  s.version = VERSION;
  return s;
}

function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();
let view = "today"; // 'today' | 'stats' | 'settings'
let editingHabitId = null; // for modal
let modalOpen = false;
let modalDraft = null;
let confettiFiredThisSession = false;

function uid(){
  return "h_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2,8);
}

/* =========================================================
   DATE UTILS (local time, not UTC)
   ========================================================= */
function pad2(n){ return n < 10 ? "0"+n : ""+n; }

function toDateStr(d){
  return d.getFullYear() + "-" + pad2(d.getMonth()+1) + "-" + pad2(d.getDate());
}

function todayStr(){
  return toDateStr(new Date());
}

function parseDateStr(str){
  // parse YYYY-MM-DD as a LOCAL date (avoid UTC shift from new Date("YYYY-MM-DD"))
  const [y,m,d] = str.split("-").map(Number);
  return new Date(y, m-1, d);
}

function addDaysStr(str, n){
  const d = parseDateStr(str);
  d.setDate(d.getDate()+n);
  return toDateStr(d);
}

function dowOf(str){
  return parseDateStr(str).getDay(); // 0=Sun..6=Sat
}

function compareDateStr(a,b){
  return a < b ? -1 : (a > b ? 1 : 0);
}

function isFuture(str){
  return compareDateStr(str, todayStr()) > 0;
}

function formatFriendly(str){
  const d = parseDateStr(str);
  return d.toLocaleDateString(undefined, { weekday:"long", month:"long", day:"numeric" });
}

/* =========================================================
   HABIT LOGIC (pure functions — testable by reading)
   ========================================================= */
function isScheduled(habit, dateStr){
  return habit.days.includes(dowOf(dateStr));
}

function activeHabits(){
  return state.habits.filter(h => !h.archived);
}

function todaysHabits(){
  const t = todayStr();
  return activeHabits().filter(h => isScheduled(h, t) && compareDateStr(h.created, t) <= 0);
}

function isDone(habit, dateStr){
  return !!habit.log[dateStr];
}

function setDone(habit, dateStr, val){
  if(val) habit.log[dateStr] = true;
  else delete habit.log[dateStr];
}

// Current streak: count backward from today; today's miss doesn't break (still "in progress"),
// but any prior scheduled+missed day stops the count. Unscheduled days are skipped entirely.
function currentStreak(habit, refDateStr){
  refDateStr = refDateStr || todayStr();
  let streak = 0;
  let d = refDateStr;
  let isFirstDay = true;
  while(compareDateStr(d, habit.created) >= 0){
    if(isScheduled(habit, d)){
      if(isDone(habit, d)){
        streak++;
      } else if(isFirstDay && d === refDateStr){
        // today not logged yet — don't break, just don't count it
      } else {
        break;
      }
    }
    isFirstDay = false;
    d = addDaysStr(d, -1);
  }
  return streak;
}

// Best streak ever: walk forward from creation, tracking the longest run.
function bestStreak(habit, refDateStr){
  refDateStr = refDateStr || todayStr();
  let best = 0, running = 0;
  let d = habit.created;
  while(compareDateStr(d, refDateStr) <= 0){
    if(isScheduled(habit, d)){
      if(isDone(habit, d)){ running++; if(running > best) best = running; }
      else { running = 0; }
    }
    d = addDaysStr(d, 1);
  }
  return best;
}

function flameForStreak(n){
  if(n >= 100) return "🔥🔥🔥";
  if(n >= 30) return "🔥🔥";
  if(n >= 7) return "🔥";
  return "";
}

// % of scheduled+existing habits completed on a given day (0 if none scheduled)
function dayCompletionPct(dateStr){
  const scheduled = activeHabits().filter(h => isScheduled(h, dateStr) && compareDateStr(h.created, dateStr) <= 0);
  if(scheduled.length === 0) return null; // no data (not "0%", genuinely nothing scheduled)
  const done = scheduled.filter(h => isDone(h, dateStr)).length;
  return { pct: done/scheduled.length, done, total: scheduled.length };
}

function heatmapLevel(pct){
  if(pct === null) return 0;
  if(pct <= 0) return 0;
  if(pct < .34) return 1;
  if(pct < .67) return 2;
  if(pct < 1) return 3;
  return 4;
}

function habitCompletionPctOverDays(habit, days){
  const t = todayStr();
  let scheduled = 0, done = 0;
  for(let i=0;i<days;i++){
    const d = addDaysStr(t, -i);
    if(compareDateStr(d, habit.created) < 0) continue;
    if(isScheduled(habit, d)){
      scheduled++;
      if(isDone(habit, d)) done++;
    }
  }
  return scheduled === 0 ? 0 : done/scheduled;
}

function longestOverallStreak(days){
  // longest run of consecutive "perfect days" (100% of scheduled habits done) within window
  const t = todayStr();
  let best = 0, running = 0;
  for(let i=days-1;i>=0;i--){
    const d = addDaysStr(t, -i);
    const info = dayCompletionPct(d);
    if(info && info.pct === 1){ running++; if(running>best) best = running; }
    else if(info === null){ /* no habits scheduled — doesn't break the streak */ }
    else { running = 0; }
  }
  return best;
}

function perfectDaysCount(days){
  const t = todayStr();
  let count = 0;
  for(let i=0;i<days;i++){
    const d = addDaysStr(t, -i);
    const info = dayCompletionPct(d);
    if(info && info.pct === 1) count++;
  }
  return count;
}

/* =========================================================
   RENDER HELPERS
   ========================================================= */
const app = document.getElementById("app");

function el(tag, attrs, children){
  const e = document.createElement(tag);
  attrs = attrs || {};
  for(const k in attrs){
    if(k === "class") e.className = attrs[k];
    else if(k === "html") e.innerHTML = attrs[k];
    else if(k === "text") e.textContent = attrs[k];
    else if(k.startsWith("on") && typeof attrs[k] === "function") e.addEventListener(k.slice(2), attrs[k]);
    else if(k === "style") e.setAttribute("style", attrs[k]);
    else if(attrs[k] === null || attrs[k] === undefined || attrs[k] === false) { /* skip: no attribute */ }
    else e.setAttribute(k, attrs[k]);
  }
  (children||[]).forEach(c => { if(c) e.appendChild(c); });
  return e;
}

function svgRing(pct, size, strokeWidth, colorId){
  const r = (size - strokeWidth)/2;
  const c = 2*Math.PI*r;
  const offset = c * (1-pct);
  const gradId = "grad-" + colorId;
  return `<svg class="ring" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <defs><linearGradient id="${gradId}" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient></defs>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#232b36" stroke-width="${strokeWidth}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="url(#${gradId})" stroke-width="${strokeWidth}"
      stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${offset}"/>
  </svg>`;
}

function motivationalLine(pct, total){
  if(total === 0) return "Add a habit to get started.";
  if(pct >= 1) return "Perfect day. All done. 🎉";
  if(pct === 0) return "Let's get the first one in.";
  if(pct < .5) return "Good start — keep going.";
  return "Over halfway there!";
}

/* =========================================================
   MAIN RENDER
   ========================================================= */
function render(){
  app.innerHTML = "";
  app.appendChild(renderHeader());

  if(view === "today") app.appendChild(renderToday());
  else if(view === "stats") app.appendChild(renderStats());
  else if(view === "settings") app.appendChild(renderSettings());

  renderModal();
  maybeFireConfetti();
}

function renderHeader(){
  const h = el("header", {class:"top"}, [
    el("h1", {}, [document.createTextNode("🌿 "), el("span",{class:"accent-text",text:"Habitline"})]),
    el("div", {class:"navbtns"}, [
      el("button", {class:"btn btn-ghost" + (view==="today"?" active":""), onclick:()=>{view="today";render();}, text:"Today"}),
      el("button", {class:"btn btn-ghost" + (view==="stats"?" active":""), onclick:()=>{view="stats";render();}, text:"Stats"}),
      el("button", {class:"btn btn-ghost" + (view==="settings"?" active":""), onclick:()=>{view="settings";render();}, text:"⚙️"}),
    ])
  ]);
  return h;
}

function renderToday(){
  const frag = document.createDocumentFragment();
  const habits = todaysHabits();
  const t = todayStr();
  const doneCount = habits.filter(h => isDone(h,t)).length;
  const pct = habits.length ? doneCount/habits.length : 0;

  const hero = el("div", {class:"hero"}, [
    el("div", {class:"ring-wrap", html: svgRing(pct, 88, 8, "hero")}, []),
    el("div", {class:"info"}, [
      el("div", {class:"date", text: formatFriendly(t)}),
      el("div", {class:"msg", text: motivationalLine(pct, habits.length)}),
    ])
  ]);
  hero.querySelector(".ring-wrap").insertAdjacentHTML("beforeend", `<div class="ring-pct">${habits.length? Math.round(pct*100)+"%" : "—"}</div>`);
  frag.appendChild(hero);

  if(activeHabits().length === 0){
    frag.appendChild(renderEmptyState());
  } else if(habits.length === 0){
    const box = el("div", {class:"empty"}, [
      el("p", {text:"Nothing scheduled for today. Enjoy the rest, or add a daily habit."}),
      el("button", {class:"btn btn-primary", text:"+ Add Habit", onclick: openAddModal}),
    ]);
    frag.appendChild(box);
  } else {
    const list = el("div", {class:"habit-list"});
    habits.forEach(h => list.appendChild(renderHabitCard(h)));
    frag.appendChild(list);
  }

  frag.appendChild(el("div", {class:"fab-row"}, [
    el("button", {class:"btn btn-primary", text:"+ Add Habit", onclick: openAddModal})
  ]));

  return frag;
}

function renderEmptyState(){
  return el("div", {class:"empty", html: `
    <svg viewBox="0 0 200 140" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="30" y="30" width="140" height="90" rx="14" stroke="#232b36" stroke-width="3"/>
      <circle cx="70" cy="75" r="16" stroke="#10b981" stroke-width="3"/>
      <path d="M63 75l5 6 10-12" stroke="#2dd4bf" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="100" y1="65" x2="150" y2="65" stroke="#232b36" stroke-width="3" stroke-linecap="round"/>
      <line x1="100" y1="85" x2="140" y2="85" stroke="#232b36" stroke-width="3" stroke-linecap="round"/>
      <circle cx="150" cy="30" r="10" fill="#10b981" opacity=".25"/>
      <circle cx="34" cy="115" r="6" fill="#2dd4bf" opacity=".3"/>
    </svg>
    <p>No habits yet. Add your first one and start building your streak.</p>
  `});
}

function renderHabitCard(habit){
  const t = todayStr();
  const done = isDone(habit, t);
  const cur = currentStreak(habit);
  const flame = flameForStreak(cur);

  const card = el("div", {class:"habit-card"});
  const ring = el("button", {
    class: "check-ring" + (done ? " done" : ""),
    "aria-pressed": done ? "true" : "false",
    "aria-label": (done ? "Mark not done: " : "Mark done: ") + habit.name,
    style: done ? "" : `border-color:${habit.color}55`,
    onclick: (e) => toggleToday(habit, e.currentTarget)
  }, []);
  ring.innerHTML = `<span class="emoji">${habit.emoji}</span>`;

  const row = el("div", {class:"habit-row"}, [
    ring,
    el("div", {class:"habit-meta"}, [
      el("div", {class:"habit-name"}, [
        document.createTextNode(habit.name + " "),
        flame ? el("span", {class:"flame", text: flame}) : null,
      ]),
      el("div", {class:"habit-sub"}, [
        el("span", {text: freqLabel(habit)}),
        el("span", {text: "Streak: " + cur}),
        el("span", {text: "Best: " + bestStreak(habit)}),
      ]),
    ]),
    el("div", {class:"card-actions"}, [
      el("button", {class:"btn btn-ghost btn-icon", "aria-label":"Edit "+habit.name, text:"✏️", onclick:()=>openEditModal(habit.id)}),
    ]),
  ]);
  card.appendChild(row);
  card.appendChild(renderWeekStrip(habit));
  return card;
}

function freqLabel(habit){
  if(habit.days.length === 7) return "Daily";
  if(habit.days.length === 5 && !habit.days.includes(0) && !habit.days.includes(6)) return "Weekdays";
  return habit.days.slice().sort().map(d => DAY_LABELS[d]).join(" ");
}

function renderWeekStrip(habit){
  const container = el("div", {});
  const strip = el("div", {class:"week-strip"});
  const labels = el("div", {class:"week-labels"});
  const t = todayStr();
  for(let i=6;i>=0;i--){
    const d = addDaysStr(t, -i);
    const scheduled = isScheduled(habit, d) && compareDateStr(habit.created, d) <= 0;
    const future = isFuture(d);
    const done = isDone(habit, d);
    let cls = "week-cell";
    if(!scheduled) cls += " unscheduled";
    else if(done) cls += " done";
    if(future) cls += " future";
    if(d === t) cls += " today";
    const cell = el("button", {
      class: cls,
      "aria-label": DAY_LABELS_FULL[dowOf(d)] + (scheduled ? (done ? " done" : " not done") : " not scheduled"),
      disabled: (future || !scheduled) ? "disabled" : null,
      onclick: () => toggleDay(habit, d),
    });
    strip.appendChild(cell);
    labels.appendChild(el("span", {text: DAY_LABELS[dowOf(d)]}));
  }
  container.appendChild(strip);
  container.appendChild(labels);
  return container;
}

function toggleToday(habit, ringEl){
  const t = todayStr();
  const willBeDone = !isDone(habit, t);
  setDone(habit, t, willBeDone);
  saveState();
  if(willBeDone && ringEl){
    ringEl.classList.add("pop");
    setTimeout(()=>ringEl && ringEl.classList.remove("pop"), 300);
  }
  render();
}

function toggleDay(habit, dateStr){
  if(isFuture(dateStr)) return;
  setDone(habit, dateStr, !isDone(habit, dateStr));
  saveState();
  render();
}

/* =========================================================
   CONFETTI
   ========================================================= */
function maybeFireConfetti(){
  const t = todayStr();
  const habits = todaysHabits();
  if(habits.length === 0) return;
  const allDone = habits.every(h => isDone(h, t));
  if(allDone && state.confettiShownDate !== t){
    state.confettiShownDate = t;
    saveState();
    fireConfetti();
  } else if(!allDone && state.confettiShownDate === t){
    // day is no longer perfect (user unchecked something) — allow re-fire if they complete it again
    state.confettiShownDate = null;
    saveState();
  }
}

function fireConfetti(){
  const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if(reduce) return;
  const canvas = document.getElementById("confetti");
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const colors = ["#10b981","#2dd4bf","#60a5fa","#facc15","#f472b6"];
  const particles = [];
  const n = 90;
  for(let i=0;i<n;i++){
    particles.push({
      x: canvas.width/2 + (Math.random()-0.5)*80,
      y: canvas.height*0.35,
      vx: (Math.random()-0.5)*10,
      vy: -Math.random()*10 - 4,
      size: Math.random()*6+4,
      color: colors[Math.floor(Math.random()*colors.length)],
      rot: Math.random()*Math.PI*2,
      vr: (Math.random()-0.5)*0.3,
      life: 0,
    });
  }
  let frame = 0;
  const maxFrames = 110;
  function step(){
    frame++;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p => {
      p.vy += 0.35; // gravity
      p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.max(0, 1 - frame/maxFrames);
      ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size*0.6);
      ctx.restore();
    });
    if(frame < maxFrames){
      requestAnimationFrame(step);
    } else {
      ctx.clearRect(0,0,canvas.width,canvas.height);
    }
  }
  requestAnimationFrame(step);
}

window.addEventListener("resize", () => {
  const canvas = document.getElementById("confetti");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

/* =========================================================
   STATS VIEW
   ========================================================= */
function renderStats(){
  const frag = document.createDocumentFragment();
  const habits = activeHabits();

  if(habits.length === 0){
    frag.appendChild(renderEmptyState());
    return frag;
  }

  frag.appendChild(el("div", {class:"section-title", text:"Activity — last 26 weeks"}));
  frag.appendChild(renderHeatmapCard());

  frag.appendChild(el("div", {class:"section-title", text:"Completion — last 30 days"}));
  const barsCard = el("div", {class:"card"});
  habits.forEach(h => {
    const pct = habitCompletionPctOverDays(h, 30);
    barsCard.appendChild(el("div", {class:"bar-row"}, [
      el("div", {class:"bar-label"}, [document.createTextNode(h.emoji + " " + h.name)]),
      el("div", {class:"bar-track"}, [el("div", {class:"bar-fill", style:`width:${Math.round(pct*100)}%; background:linear-gradient(90deg, ${h.color}, #2dd4bf)`})]),
      el("div", {class:"bar-pct", text: Math.round(pct*100)+"%"}),
    ]));
  });
  frag.appendChild(barsCard);

  frag.appendChild(el("div", {class:"section-title", text:"Totals"}));
  const totals = el("div", {class:"totals-grid"}, [
    totalBox(perfectDaysCount(182), "Perfect days"),
    totalBox(longestOverallStreak(182), "Longest all-habit streak"),
    totalBox(habits.length, "Active habits"),
  ]);
  frag.appendChild(totals);

  return frag;
}

function totalBox(num, label){
  return el("div", {class:"total-box"}, [
    el("div", {class:"num", text: String(num)}),
    el("div", {class:"lbl", text: label}),
  ]);
}

function renderHeatmapCard(){
  const card = el("div", {class:"card"});
  const scroll = el("div", {class:"heatmap-scroll"});
  const grid = el("div", {class:"heatmap"});
  const t = todayStr();
  const totalDays = 26*7;
  // build oldest -> newest, column-major (7 rows per week) so CSS grid-auto-flow:column lays weeks left-to-right
  const startOffset = totalDays - 1;
  for(let i=startOffset;i>=0;i--){
    const d = addDaysStr(t, -i);
    const info = dayCompletionPct(d);
    const lvl = info ? heatmapLevel(info.pct) : 0;
    const cell = el("div", {class:"hcell", "data-lvl": String(lvl), tabindex:"0", "aria-label": d});
    cell.addEventListener("mouseenter", (e) => showTooltip(e, d, info));
    cell.addEventListener("focus", (e) => showTooltip(e, d, info));
    cell.addEventListener("mouseleave", hideTooltip);
    cell.addEventListener("blur", hideTooltip);
    cell.addEventListener("click", (e) => showTooltip(e, d, info));
    grid.appendChild(cell);
  }
  scroll.appendChild(grid);
  card.appendChild(scroll);

  const legend = el("div", {class:"heatmap-legend"}, [
    el("span", {text:"Less"}),
    el("div", {class:"hcell", "data-lvl":"0"}),
    el("div", {class:"hcell", "data-lvl":"1"}),
    el("div", {class:"hcell", "data-lvl":"2"}),
    el("div", {class:"hcell", "data-lvl":"3"}),
    el("div", {class:"hcell", "data-lvl":"4"}),
    el("span", {text:"More"}),
  ]);
  card.appendChild(legend);
  // scroll to the end (today) on first render
  requestAnimationFrame(() => { scroll.scrollLeft = scroll.scrollWidth; });
  return card;
}

let tooltipEl = null;
function showTooltip(e, dateStr, info){
  hideTooltip();
  const text = info ? `${formatFriendly(dateStr)} — ${info.done}/${info.total} done` : `${formatFriendly(dateStr)} — nothing scheduled`;
  tooltipEl = el("div", {class:"tooltip", text});
  document.body.appendChild(tooltipEl);
  const rect = e.currentTarget.getBoundingClientRect();
  tooltipEl.style.left = (rect.left + rect.width/2) + "px";
  tooltipEl.style.top = rect.top + "px";
}
function hideTooltip(){
  if(tooltipEl){ tooltipEl.remove(); tooltipEl = null; }
}

/* =========================================================
   SETTINGS VIEW
   ========================================================= */
function renderSettings(){
  const frag = document.createDocumentFragment();

  frag.appendChild(el("div", {class:"section-title", text:"Data"}));
  const dataCard = el("div", {class:"card"});
  const row = el("div", {class:"settings-row"}, [
    el("button", {class:"btn", text:"⬇ Export JSON", onclick: exportData}),
    el("button", {class:"btn", text:"⬆ Import JSON", onclick: () => document.getElementById("import-file").click()}),
  ]);
  dataCard.appendChild(row);
  dataCard.appendChild(el("p", {class:"hint", text:"Export saves a JSON snapshot of every habit and its history. Import restores from that file (replaces current data)."}));
  const fileInput = el("input", {type:"file", accept:"application/json", id:"import-file", style:"display:none", onchange: handleImport});
  dataCard.appendChild(fileInput);
  frag.appendChild(dataCard);

  frag.appendChild(el("div", {class:"section-title", text:"Manage habits"}));
  const manageCard = el("div", {class:"card"});
  if(state.habits.length === 0){
    manageCard.appendChild(el("p", {class:"hint", text:"No habits yet."}));
  } else {
    state.habits.forEach((h, idx) => manageCard.appendChild(renderManageRow(h, idx)));
  }
  frag.appendChild(manageCard);

  frag.appendChild(el("div", {class:"section-title", text:"Danger zone"}));
  const dangerCard = el("div", {class:"card"});
  dangerCard.appendChild(el("button", {class:"btn btn-danger", text:"Reset all data", style:"width:100%", onclick: resetAll}));
  frag.appendChild(dangerCard);

  return frag;
}

function renderManageRow(habit, idx){
  const row = el("div", {class:"bar-row"});
  row.appendChild(el("div", {class:"bar-label", style:"width:auto;flex:1"}, [document.createTextNode(habit.emoji + " " + habit.name + (habit.archived ? " (archived)" : ""))]));
  const actions = el("div", {style:"display:flex;gap:2px"});
  actions.appendChild(el("button", {class:"btn btn-ghost btn-icon", "aria-label":"Move up", text:"↑", disabled: idx===0?"disabled":null, onclick:()=>moveHabit(habit.id,-1)}));
  actions.appendChild(el("button", {class:"btn btn-ghost btn-icon", "aria-label":"Move down", text:"↓", disabled: idx===state.habits.length-1?"disabled":null, onclick:()=>moveHabit(habit.id,1)}));
  actions.appendChild(el("button", {class:"btn btn-ghost btn-icon", "aria-label":"Edit", text:"✏️", onclick:()=>openEditModal(habit.id)}));
  actions.appendChild(el("button", {class:"btn btn-ghost btn-icon", "aria-label": habit.archived?"Unarchive":"Archive", text: habit.archived?"📤":"🗄️", onclick:()=>toggleArchive(habit.id)}));
  actions.appendChild(el("button", {class:"btn btn-ghost btn-icon", "aria-label":"Delete", text:"🗑️", onclick:()=>deleteHabit(habit.id)}));
  row.appendChild(actions);
  return row;
}

function moveHabit(id, dir){
  const i = state.habits.findIndex(h => h.id === id);
  const j = i + dir;
  if(j < 0 || j >= state.habits.length) return;
  const tmp = state.habits[i];
  state.habits[i] = state.habits[j];
  state.habits[j] = tmp;
  saveState();
  render();
}

function toggleArchive(id){
  const h = state.habits.find(h => h.id === id);
  if(!h) return;
  h.archived = !h.archived;
  saveState();
  render();
}

function deleteHabit(id){
  const h = state.habits.find(h => h.id === id);
  if(!h) return;
  if(!confirm(`Delete "${h.name}"? This removes all its history and can't be undone.`)) return;
  state.habits = state.habits.filter(x => x.id !== id);
  saveState();
  render();
}

function resetAll(){
  if(!confirm("This will permanently delete ALL habits and history. Continue?")) return;
  if(!confirm("Really sure? There is no undo after this second confirmation.")) return;
  state = defaultState();
  saveState();
  view = "today";
  render();
}

function exportData(){
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `habitline-export-${todayStr()}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function handleImport(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const parsed = JSON.parse(reader.result);
      if(!parsed || !Array.isArray(parsed.habits)) throw new Error("Invalid file format");
      state = migrate(parsed);
      saveState();
      view = "today";
      render();
      alert("Import successful.");
    }catch(err){
      alert("Could not import: " + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = "";
}

/* =========================================================
   ADD / EDIT HABIT MODAL
   ========================================================= */
function openAddModal(){
  editingHabitId = null;
  modalDraft = { name:"", emoji: EMOJI_CHOICES[0], color: COLOR_CHOICES[0], freq:"daily", days:[0,1,2,3,4,5,6] };
  modalOpen = true;
  render();
}

function openEditModal(id){
  const h = state.habits.find(h => h.id === id);
  if(!h) return;
  editingHabitId = id;
  const isWeekdays = h.days.length===5 && !h.days.includes(0) && !h.days.includes(6);
  const isDaily = h.days.length === 7;
  modalDraft = { name: h.name, emoji: h.emoji, color: h.color, freq: isDaily?"daily":(isWeekdays?"weekdays":"custom"), days: h.days.slice() };
  modalOpen = true;
  render();
}

function closeModal(){
  modalOpen = false;
  modalDraft = null;
  editingHabitId = null;
  render();
}

function renderModal(){
  let backdrop = document.getElementById("modal-backdrop");
  if(backdrop) backdrop.remove();
  if(!modalOpen) return;

  backdrop = el("div", {class:"modal-backdrop open", id:"modal-backdrop", onclick:(e)=>{ if(e.target===backdrop) closeModal(); }});
  const modal = el("div", {class:"modal", role:"dialog", "aria-modal":"true"});
  modal.appendChild(el("h2", {text: editingHabitId ? "Edit Habit" : "New Habit"}));

  // name
  const nameField = el("div", {class:"field"});
  nameField.appendChild(el("label", {text:"Name", for:"habit-name-input"}));
  const nameInput = el("input", {type:"text", id:"habit-name-input", value: modalDraft.name, maxlength:"40", placeholder:"e.g. Drink water", oninput:(e)=>{modalDraft.name=e.target.value;}});
  nameField.appendChild(nameInput);
  modal.appendChild(nameField);

  // emoji
  const emojiField = el("div", {class:"field"});
  emojiField.appendChild(el("label", {text:"Icon"}));
  const grid = el("div", {class:"emoji-grid"});
  EMOJI_CHOICES.forEach(em => {
    const opt = el("button", {
      class: "emoji-opt" + (modalDraft.emoji===em?" sel":""),
      text: em,
      "aria-label": "Pick icon " + em,
      "aria-pressed": modalDraft.emoji===em ? "true":"false",
      onclick: ()=>{ modalDraft.emoji = em; renderModal(); }
    });
    grid.appendChild(opt);
  });
  emojiField.appendChild(grid);
  modal.appendChild(emojiField);

  // color
  const colorField = el("div", {class:"field"});
  colorField.appendChild(el("label", {text:"Color"}));
  const colorRow = el("div", {class:"color-row"});
  COLOR_CHOICES.forEach(c => {
    const opt = el("button", {
      class:"color-opt"+(modalDraft.color===c?" sel":""),
      style:`background:${c}`,
      "aria-label":"Pick color "+c,
      "aria-pressed": modalDraft.color===c ? "true":"false",
      onclick:()=>{ modalDraft.color=c; renderModal(); }
    });
    colorRow.appendChild(opt);
  });
  colorField.appendChild(colorRow);
  modal.appendChild(colorField);

  // frequency
  const freqField = el("div", {class:"field"});
  freqField.appendChild(el("label", {text:"Frequency"}));
  const freqRow = el("div", {class:"freq-row"});
  [["daily","Daily"],["weekdays","Weekdays"],["custom","Custom"]].forEach(([key,label]) => {
    freqRow.appendChild(el("button", {
      class:"freq-btn"+(modalDraft.freq===key?" sel":""),
      text:label,
      onclick:()=>{
        modalDraft.freq = key;
        if(key==="daily") modalDraft.days=[0,1,2,3,4,5,6];
        else if(key==="weekdays") modalDraft.days=[1,2,3,4,5];
        renderModal();
      }
    }));
  });
  freqField.appendChild(freqRow);

  if(modalDraft.freq === "custom"){
    const dayRow = el("div", {class:"day-row"});
    DAY_LABELS.forEach((lbl, idx) => {
      const sel = modalDraft.days.includes(idx);
      dayRow.appendChild(el("button", {
        class:"day-btn"+(sel?" sel":""),
        text: lbl,
        "aria-label": DAY_LABELS_FULL[idx],
        "aria-pressed": sel?"true":"false",
        onclick: () => {
          if(modalDraft.days.includes(idx)) modalDraft.days = modalDraft.days.filter(d=>d!==idx);
          else modalDraft.days = modalDraft.days.concat(idx);
          renderModal();
        }
      }));
    });
    freqField.appendChild(dayRow);
  }
  modal.appendChild(freqField);

  // actions
  const actions = el("div", {class:"modal-actions"}, [
    el("button", {class:"btn", text:"Cancel", onclick: closeModal}),
    el("button", {class:"btn btn-primary", text: editingHabitId ? "Save" : "Add Habit", onclick: saveModalHabit}),
  ]);
  modal.appendChild(actions);

  backdrop.appendChild(modal);
  document.body.appendChild(backdrop);
  nameInput.focus();
}

function saveModalHabit(){
  const name = modalDraft.name.trim();
  if(!name){ alert("Please enter a name."); return; }
  if(modalDraft.days.length === 0){ alert("Please pick at least one day."); return; }

  if(editingHabitId){
    const h = state.habits.find(h => h.id === editingHabitId);
    h.name = name;
    h.emoji = modalDraft.emoji;
    h.color = modalDraft.color;
    h.days = modalDraft.days.slice().sort();
  } else {
    state.habits.push({
      id: uid(),
      name,
      emoji: modalDraft.emoji,
      color: modalDraft.color,
      days: modalDraft.days.slice().sort(),
      created: todayStr(),
      archived: false,
      log: {},
    });
  }
  saveState();
  closeModal();
}

/* =========================================================
   KEYBOARD ACCESSIBILITY
   ========================================================= */
document.addEventListener("keydown", (e) => {
  if(e.key === "Escape" && modalOpen){ closeModal(); }
});

/* =========================================================
   INIT
   ========================================================= */
render();

})();
</script>
